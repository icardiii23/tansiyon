<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tansiyon ve Nabız Takibi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 min-h-screen p-4 md:p-8">

    <div class="max-w-3xl mx-auto">
        <h1 class="text-white text-2xl font-bold mb-6 border-b border-slate-700 pb-4">Tansiyon & Nabız Kayıtları</h1>
        
        <!-- Tablo Konteyneri -->
        <div class="bg-slate-800 rounded-2xl overflow-hidden shadow-2xl border border-slate-700">
            <div class="overflow-x-auto">
                <table class="w-full text-left text-slate-300">
                    <thead class="bg-slate-700/50 text-slate-100 uppercase text-xs">
                        <tr>
                            <th class="px-6 py-4">Tarih</th>
                            <th class="px-6 py-4">Büyük</th>
                            <th class="px-6 py-4">Küçük</th>
                            <th class="px-6 py-4">Nabız</th>
                        </tr>
                    </thead>
                    <tbody id="veri-tablosu" class="divide-y divide-slate-700">
                        <!-- Veriler JS ile buraya gelecek -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // --- BURADAN DÜZENLE ---
        // Yeni verileri buraya ekle: { tarih: "...", sys: 0, dia: 0, nabiz: 0 }
        const veriler = [
            { tarih: "04.07.2026 - 12:37", sys: 124, dia: 79, nabiz: 102 },
            { tarih: "04.07.2026 - 16:23", sys: 121, dia: 84, nabiz: 103 },
            { tarih: "05.07.2026 - 20:08", sys: 119, dia: 81, nabiz: 91 },
            { tarih: "06.07.2026 - 12:08", sys: 120, dia: 78, nabiz: 102 },
            { tarih: "06.07.2026 - 17:05", sys: 113, dia: 82, nabiz: 102 },
            { tarih: "07.07.2026 - 13:00", sys: 105, dia: 74, nabiz: 105 },
            { tarih: "08.07.2026 - 18:36", sys: 110, dia: 77, nabiz: 92 },
            { tarih: "11.07.2026 - 22:07", sys: 109, dia: 78, nabiz: 84 },
            { tarih: "13.07.2026 - 14:11", sys: 107, dia: 74, nabiz: 103 },
            { tarih: "14.07.2026 - 20:55", sys: 117, dia: 78, nabiz: 95 }
        ];
        // -----------------------

        const tabloGovdesi = document.getElementById('veri-tablosu');

        veriler.forEach(item => {
            const row = document.createElement('tr');
            row.className = "hover:bg-slate-700/30 transition-colors";
            
            row.innerHTML = `
                <td class="px-6 py-4 text-sm">${item.tarih}</td>
                <td class="px-6 py-4 font-bold text-indigo-400">${item.sys}</td>
                <td class="px-6 py-4 font-bold text-indigo-400">${item.dia}</td>
                <td class="px-6 py-4 font-bold text-emerald-400">${item.nabiz}</td>
            `;
            tabloGovdesi.appendChild(row);
        });
    </script>
</body>
</html>
